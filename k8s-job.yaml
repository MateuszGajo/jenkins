apiVersion: batch/v1
kind: Job
metadata:
  name: demo-job
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - name: demo-job
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              i=1
              while [ "$i" -le 120 ]; do
                echo "$i"
                sleep 1
                i=$((i + 1))
              done
              echo "Job finished"
      restartPolicy: Never
