apiVersion: batch/v1
kind: Job
metadata:
  name: demo-job
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - name: demo-job
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Hello from Kubernetes Job"
              sleep 10
              echo "Job finished"
      restartPolicy: Never
